body:
  text: 大宋國沙門道隆蘭溪述摩訶摩訶者梵語此曰大諸佛眾生平等之自性也日月不能照虗空無容亘十方無涯際徹三世無際限欲知此可盡已小心小心者妄想識情又有無取捨空不空生佛迷悟等二致也若無小心即大心也在眼曰見在耳曰聞小心眾生漆桶不會可憐生向外求咄眉毛本在眼上般若般若者梵語此曰智慧逐諸境界心背真故不知無我我即愚癡全體也離愚癡謂智有其方便謂慧智者慧之體慧者智之用也眾生本來具足矣三世諸佛歷代祖師天下老和尚繇之施妙用現神通下喝行棒真般若非文字蠢動含靈本來真性也即今且道那箇是般若良久曰日面佛月面佛波羅蜜多波羅蜜多者梵語此曰彼岸到無生死是彼岸有涅槃是此岸離生死出涅槃即清淨本覺也故曰淨極光通達寂照含虗空却來觀世間猶如夢中事即今見聞覺知起居動靜歷歷分明是夢耶是覺耶是生死耶是涅槃耶是垢穢耶是清淨耶諸人向自己命脉上自辨別看良久曰白鳥入蘆華心經心經者大道也無小礙無差路又無小法可得故無心謂道眾生不知隨境分名相增長我見是故不行大道古人曰大道透長安到長安了當知王知了豈有他哉且道即今起居動靜得誰恩力野老不知堯舜力鼕鼕擊鼓祭江神觀自在菩薩司空山本淨禪師曰若會應處本無心始得名為觀自在行深般若波羅蜜多時行者不行一切是佛行也深者佛乘也不見一法即如來也淺者聲聞緣覺乃至著文字行般若人等也故大般若魔事品云或依文字執有般若波羅蜜多菩薩當知是為魔事又功德品云於此般若波羅蜜多受持讀誦不為毒藥所害刀兵所傷火所焚燒水所漂溺乃至不為四百四病之所夭歿云云外離諸緣內不住根本眾魔難窺六賊無破離四句絕百非無蹤跡可求故曰深般若般若鋒不立一塵即是行也照見五蘊皆空度一切苦厄五蘊者色受想行識也起心見境故曰色希望色故曰受記憶不休故曰想心妄不止故曰行行不休輪迴不免故曰識照見者返照也不染境緣退步見性謂返照般若真空也度者盡也應五蘊空苦厄盡紅日三竿伸脚眠舍利子色不異空色本自空生迷人向真空外見色了得從心起心無色相歸根得旨隨照失宗任他灰頭土面空不異色空依色現色即歸空心起故色也心無所依故空也了悟心空諸法自空真空端的作麼生道山上鯉魚水底蓬塵色即是空色即空用空即色體萬波不離水喝一喝云賓主歷然空即是色空即色體色即空用咄云事從叮嚀起受想行識亦復如是舍利子是諸法空相五蘊者了得心源自空覺心空不滯覺空所空滅佛藏經曰一切法空無我無人無眾生無壽命此之謂也諸法者色受想行識六根等之十八界也不生不滅不垢不淨不增不減心空則諸法亦空也有甚麼生滅垢淨增減哉畢竟空不立一塵一法打禪床云還聞麼是故空中無色無受想行識空本無相不得求色不會底人元來不疑無眼耳鼻舌身意六根者諸善惡業窟宅也六賊堅城也愚人謂毀堅城殺六賊心地穩密無孔鐵鎚現前打禪床云百雜碎無色聲香味觸法元依一精明分成六和合一處成休復六用皆不成塵垢應念消成圓明淨妙餘塵尚諸學明極即如來大智還同愚無眼界乃至無意識界總無十八界也舉眼界與意識界餘準之可知六根無主塵境自亡通身是眼見不到通身是耳聞不及通身是心監不出通身是舌說不得芭蕉無耳聞雷開葵華無眼向日轉且道是有眼耶是無眼耶石虎吞却木羊兒無無明凡夫迷雲被掩不知本地風光但偏逐境迷己故却物為上逐物為下直了心源則光明現故云無無明那箇是諸人本地風光新羅夜半日頭明亦無無明盡塵勞本無不加了知盡此什麼靈臺一點不揩磨乃至無老死生死之二法一心妙用有無之二法自性真德也施一心用則六根現前迷用則生也迷體則死也存生死無明也了生死無無明也兩箇泥牛鬪入海不知何人引得來亦無老死盡生死老病本來無也夢裡明明有六趣覺後空空無大千毫釐有差天地懸隔證實相理一切眾生同一清淨實相也盡是什麼良久曰張公喫酒李公醉無苦集滅道無此四聖諦法也苦諦者貪著世間相無間歇也集諦者向經論之中求妙理也滅諦者厭諸善惡求寂滅也道諦者真寂也諸佛眾生具足無欠餘咦恁麼會易不恁麼會難具衲僧眼目試甄別看無智亦無得道不在見聞覺知而不離見聞覺知中諸法從本無可得東西不辨南北不別心法并亡未夢見在諸人要會麼鐵蒺莉以無所得故菩提薩埵普照寂滅無一法可得菩提也了得諸法不可得名菩提薩埵故古人曰一如體玄兀爾忘緣依般若波羅蜜多故心無罣礙色空不二淨穢并亡境依心起有心空寂境自不存心境自空迴然無事有何罣礙要知麼八角磨盤空裡走無罣礙故無有恐怖心心無所依亦不可得不礙於生死間鑊湯爐炭吹教滅劍樹刀山喝便摧遠離一切顛倒夢想心迷謂顛堅執我凡夫謂倒四大假和合體為我六根境界為心故云夢想智者醒夢靜也迷人信夢忙也直了心源無一心可得是遠離也即今誰是遠離顛倒夢想纔有言語是揀擇是明白不在揀擇明白底是何人暗裡抽橫骨明中坐舌頭若知此人有何顛倒夢想佛法不現前不得成佛道究竟涅槃究竟窮極之義也佛祖言不及故云究竟是云理極忘情謂如何得喻齊當頭霜夜月任運落前溪三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提阿者無也耨多羅者上也三藐者正也三菩提者真道也合云無上正真道深行般若即得菩提是真解脫也佛言知即身有佛性故今得成阿耨菩提云云故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪呪者是契當句也心與行相應之謂契亦呪云心故云神呪眾生一心無有涯際十方虗空皆在心性中如空中有一片雲故云大神呪淘然明白無變易在眾生不變在佛祖不變故云本分又云心地唯此一事實餘二則非真故云大明呪萬法從一心生無始無終輭如金剛堅似兜羅綿誰分限量故云無上呪直行直用與佛祖無差別故云無等等呪要見此呪麼良久曰鎮州蘿蔔從來大也能除一切苦真實不虗諸佛依此呪得菩提故云不虗也君臣道合街頭孤峰自在受用家舍途中自由現成現成端的誰知長憶江南三月裡鷓鴣啼處百華香故說般若波羅蜜多呪即說呪曰羯諦羯諦始羯諦無妄想可除次羯諦無真可求真妄俱寂無有二法今夜一輪滿清光何處無波羅羯諦此心元來清淨無塵垢可染珊瑚枝上撐著月波羅僧羯諦清淨與塵垢雙對言也若離塵垢清淨因何立看看破鏡不重照菩提即是道也道者無依也日午打三更娑婆訶畢竟空亦無依空相亦無三人稱龜作鼈般若心經再犯不許
